services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: emotion
      POSTGRES_PASSWORD: emotion
      POSTGRES_DB: emotion_chat
    ports:
      - "5432:5432"
    volumes:
      - pgdata_emotion:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_emotion:/data

volumes:
  pgdata_emotion:
  redis_emotion:
