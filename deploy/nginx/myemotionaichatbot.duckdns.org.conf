# Paste into /etc/nginx/sites-available/ and symlink to sites-enabled.
# Adjust paths: UPSTREAM (Daphne), STATIC_ROOT, MEDIA_ROOT, FRONTEND_BUILD.
#
# After certbot: it may inject SSL server blocks; merge with this or use certbot --nginx.

upstream daphne_backend {
    server 127.0.0.1:8000 fail_timeout=0;
}

# HTTP → HTTPS (certbot usually manages this server on port 80)
server {
    listen 80;
    listen [::]:80;
    server_name www.myemotionaichatbot.duckdns.org myemotionaichatbot.duckdns.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://www.myemotionaichatbot.duckdns.org$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name myemotionaichatbot.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/www.myemotionaichatbot.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.myemotionaichatbot.duckdns.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://www.myemotionaichatbot.duckdns.org$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.myemotionaichatbot.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/www.myemotionaichatbot.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.myemotionaichatbot.duckdns.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # React production build (rsync from CI/deploy)
    root /var/www/emotion-chat/html;
    index index.html;

    client_max_body_size 25M;

    # CRA build assets use /static/js/ and /static/css/ — must be served from the
    # React build dir, NOT Django collectstatic (same URL prefix as admin static).
    location ^~ /static/js/ {
        alias /var/www/emotion-chat/html/static/js/;
        expires 7d;
        add_header Cache-Control "public";
    }
    location ^~ /static/css/ {
        alias /var/www/emotion-chat/html/static/css/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Django collectstatic (admin, etc.) — ensure nginx (www-data) can traverse
    # each directory in the path (e.g. chmod o+x /home/REPLACE_USER) or move STATIC_ROOT under /var/www.
    location /static/ {
        alias /home/REPLACE_USER/chat_bot/emotion_chat/staticfiles/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location /media/ {
        alias /home/REPLACE_USER/chat_bot/emotion_chat/media/;
        expires 7d;
    }

    location /api/ {
        proxy_pass http://daphne_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_read_timeout 120s;
    }

    # WebSockets (Channels) — same upgrade headers as HTTP/1.1
    location /ws/ {
        proxy_pass http://daphne_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
